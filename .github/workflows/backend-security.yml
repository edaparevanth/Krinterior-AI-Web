name: Backend CI and Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-security:
    runs-on: ubuntu-latest
    env:
      MONGO_URL: mongodb://127.0.0.1:27017
      DB_NAME: krinterior_ci
      EMERGENT_LLM_KEY: ci-placeholder-not-used
      JWT_SECRET: ci-placeholder-secret-with-enough-length

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt

      - name: Run backend tests
        run: pytest backend/tests --junitxml=backend-security-reports/pytest-results.xml

      - name: Run automated DAST/security checks
        run: python automated_test/run_security_checks.py --input automated_test/input.json --output automated_test/report.json

      - name: Upload backend security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-reports
          path: |
            backend-security-reports/
            automated_test/report.json
