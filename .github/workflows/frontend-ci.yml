name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      CI: true
      BROWSER: none
      REACT_APP_BACKEND_URL: http://127.0.0.1:8000
      REACT_APP_E2E_MOCKS: "true"
      APP_BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup Chromedriver
        uses: nanasess/setup-chromedriver@v2

      - name: Start frontend
        run: |
          npm start > ../frontend-server.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS "$APP_BASE_URL/login" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../frontend-server.log
          exit 1

      - name: Run Selenium tests
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run selenium:ci

      - name: Upload Mochawesome reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: frontend/mochawesome-report/

      - name: Upload frontend server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-server-log
          path: frontend-server.log
