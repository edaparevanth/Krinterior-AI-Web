name: E2E Tests + Excel Report + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: selenium-login-${{ github.ref }}
  cancel-in-progress: false

jobs:
  selenium-tests:
    name: Selenium - Website Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest openpyxl selenium requests

      - name: Run Selenium tests
        run: |
          pytest tests/test_selenium.py -v

      - name: Upload Selenium Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-web-report
          path: test_reports/selenium-web-report.xlsx

  appium-tests:
    name: Appium - Android Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest openpyxl selenium requests

      - name: Run Appium tests
        run: |
          pytest tests/test_appium.py -v

      - name: Upload Appium Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-android-report
          path: test_reports/appium-android-report.xlsx

  unit-tests:
    name: Unit Tests - API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest openpyxl requests

      - name: Run Unit tests
        run: |
          pytest tests/test_unit.py -v

      - name: Upload Unit Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: test_reports/unit-test-report.xlsx

  validation-tests:
    name: Validation Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest openpyxl

      - name: Run Validation tests
        run: |
          pytest tests/test_validation.py -v

      - name: Upload Validation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-test-report
          path: test_reports/validation-test-report.xlsx

  deployment-status:
    name: Deployment Status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest openpyxl requests

      - name: Run Deployment tests
        run: |
          pytest tests/test_deployment.py -v

      - name: Upload Deployment Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-test-report
          path: test_reports/deployment-test-report.xlsx

  load-testing:
    name: Load Testing - Performance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest openpyxl

      - name: Run Load tests
        run: |
          pytest tests/test_load.py -v || true

      - name: Upload Load Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: test_reports/load-test-report.xlsx

  compile-reports:
    name: Compile Master Report & Deploy
    needs:
      - selenium-tests
      - appium-tests
      - unit-tests
      - validation-tests
      - deployment-status
      - load-testing
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Organize report files
        run: |
          mkdir -p test_reports
          find downloaded-artifacts -name "*.xlsx" -exec cp {} test_reports/ \; || true
          ls -R test_reports

      - name: Run Master Compile Script
        run: |
          python tests/build_excel_reports.py

      - name: Upload Master E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: full-e2e-report
          path: test_reports/full-e2e-report.xlsx

      - name: Write GitHub Step Summary
        run: |
          echo "## Krinterior AI Consolidated E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All E2E check suites have run successfully." >> $GITHUB_STEP_SUMMARY
          echo "The website is deployed and hosted on GitHub Pages: https://edaparevanth.github.io/Krinterior-AI-Web/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Individual Excel reports are uploaded and available in artifacts." >> $GITHUB_STEP_SUMMARY
