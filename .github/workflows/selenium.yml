name: Selenium E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Install Selenium dependencies
        run: |
          cd frontend
          npm install selenium-webdriver chromedriver mocha --legacy-peer-deps

      - name: Run Selenium tests
        run: |
          cd frontend
          npx mocha selenium-tests/tests/*.js